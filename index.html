<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="現在地読み上げ">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="./manifest.json">
  <title>現在地読み上げ</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #1a1a2e;
      color: #ffffff;
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      color: #a0b4cc;
      margin-bottom: 48px;
      letter-spacing: 0.05em;
    }

    #main-btn {
      width: min(80vw, 320px);
      height: min(80vw, 320px);
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #4a90d9, #2c6fad);
      color: #ffffff;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      box-shadow:
        0 8px 32px rgba(74, 144, 217, 0.4),
        0 0 0 0 rgba(74, 144, 217, 0.3);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      -webkit-user-select: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #main-btn:active {
      transform: scale(0.96);
      box-shadow:
        0 4px 16px rgba(74, 144, 217, 0.3),
        0 0 0 0 rgba(74, 144, 217, 0.2);
    }

    #main-btn.loading {
      background: linear-gradient(145deg, #6a6a8a, #4a4a6a);
      box-shadow: 0 8px 32px rgba(100, 100, 150, 0.3);
      animation: pulse 1.2s ease-in-out infinite;
    }

    #main-btn.success {
      background: linear-gradient(145deg, #43b89c, #2a8a72);
      box-shadow: 0 8px 32px rgba(67, 184, 156, 0.4);
    }

    #main-btn.error {
      background: linear-gradient(145deg, #e05a5a, #b03a3a);
      box-shadow: 0 8px 32px rgba(224, 90, 90, 0.4);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    #address-box {
      margin-top: 48px;
      width: 100%;
      max-width: 480px;
      min-height: 80px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 16px;
      padding: 20px 24px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }

    #address-text {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.7;
      color: #f0f4f8;
      word-break: break-all;
    }

    #address-text.placeholder {
      font-size: 0.95rem;
      font-weight: 400;
      color: #5a6a7a;
    }

    #speak-btn {
      margin-top: 16px;
      background: none;
      border: 1px solid rgba(74, 144, 217, 0.5);
      color: #4a90d9;
      font-size: 0.9rem;
      padding: 10px 28px;
      border-radius: 24px;
      cursor: pointer;
      display: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #speak-btn.visible {
      display: inline-block;
    }
  </style>
</head>
<body>

  <h1>現在地読み上げ</h1>

  <button id="main-btn" onclick="getLocation()">
    <span id="btn-label">現在地を取得</span>
  </button>

  <div id="address-box">
    <span id="address-text" class="placeholder">ボタンを押すと住所を取得します</span>
  </div>

  <button id="speak-btn" onclick="speakAddress()">もう一度読み上げ</button>

  <script>
    // ---- APIキー設定 ----
    const GOOGLE_API_KEY = '__GOOGLE_API_KEY__';
    // --------------------

    let currentAddress = '';

    // iOS Safariの音声制限を解除するため、ユーザー操作の同期タイミングで空発話してアンロックする
    function unlockSpeech() {
      if (!window.speechSynthesis) return;
      const unlock = new SpeechSynthesisUtterance('');
      unlock.volume = 0;
      window.speechSynthesis.speak(unlock);
    }

    async function getLocation() {
      const btn = document.getElementById('main-btn');
      const label = document.getElementById('btn-label');
      const addressText = document.getElementById('address-text');
      const speakBtn = document.getElementById('speak-btn');

      if (btn.classList.contains('loading')) return;

      // ユーザー操作の同期処理内でアンロック（非同期になる前に呼ぶ）
      unlockSpeech();

      // 取得中状態
      btn.className = 'loading';
      label.textContent = '取得中...';
      addressText.textContent = '位置情報を取得しています...';
      addressText.classList.remove('placeholder');
      speakBtn.classList.remove('visible');

      if (!navigator.geolocation) {
        showError('このブラウザはGPSに対応していません');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          addressText.textContent = '住所を取得しています...';

          try {
            const address = await reverseGeocode(lat, lng);
            currentAddress = address;

            btn.className = 'success';
            label.textContent = '現在地を取得';
            addressText.textContent = address;
            speakBtn.classList.add('visible');

            speakAddress();

            // 3秒後にボタンを元に戻す
            setTimeout(() => { btn.className = ''; }, 3000);

          } catch (e) {
            showError('住所の取得に失敗しました');
          }
        },
        (err) => {
          let msg = '位置情報の取得に失敗しました';
          if (err.code === 1) msg = '位置情報の使用が許可されていません';
          if (err.code === 2) msg = '位置情報を取得できませんでした';
          if (err.code === 3) msg = '取得がタイムアウトしました';
          showError(msg);
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    async function reverseGeocode(lat, lng) {
      const url = `https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&language=ja&key=${GOOGLE_API_KEY}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('API error');
      const data = await res.json();
      if (data.status !== 'OK' || !data.results.length) throw new Error('No results');

      // 丁目・番地レベルの住所を優先して返す
      const result = data.results[0].formatted_address
        .replace(/^日本、?/, '');
      return result;
    }

    function speakAddress() {
      if (!currentAddress) return;
      if (!window.speechSynthesis) return;

      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(currentAddress);
      utter.lang = 'ja-JP';
      utter.rate = 0.9;
      utter.pitch = 1.0;
      window.speechSynthesis.speak(utter);
    }

    function showError(msg) {
      const btn = document.getElementById('main-btn');
      const label = document.getElementById('btn-label');
      const addressText = document.getElementById('address-text');

      btn.className = 'error';
      label.textContent = '現在地を取得';
      addressText.textContent = msg;
      setTimeout(() => { btn.className = ''; }, 3000);
    }
  </script>

</body>
</html>
