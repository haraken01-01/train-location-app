<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="現在地読み上げ">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="./manifest.json">
  <title>現在地読み上げ</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #1a1a2e;
      color: #fff;
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 40px;
    }

    h1 {
      font-size: 1rem;
      font-weight: 500;
      color: #a0b4cc;
      margin-bottom: 32px;
      letter-spacing: .05em;
    }

    #main-btn {
      flex-shrink: 0;
      width: min(72vw, 260px);
      height: min(72vw, 260px);
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #4a90d9, #2c6fad);
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: .05em;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(74,144,217,.4);
      transition: transform .1s, box-shadow .1s;
      -webkit-user-select: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #main-btn:active { transform: scale(.96); }

    #main-btn.loading {
      background: linear-gradient(145deg, #6a6a8a, #4a4a6a);
      box-shadow: 0 8px 32px rgba(100,100,150,.3);
      animation: pulse 1.2s ease-in-out infinite;
    }

    #main-btn.success {
      background: linear-gradient(145deg, #43b89c, #2a8a72);
      box-shadow: 0 8px 32px rgba(67,184,156,.4);
    }

    #main-btn.error {
      background: linear-gradient(145deg, #e05a5a, #b03a3a);
      box-shadow: 0 8px 32px rgba(224,90,90,.4);
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    #gps-error {
      margin-top: 14px;
      font-size: .85rem;
      color: #e07070;
      text-align: center;
    }

    #gps-error.hidden { display: none; }

    /* Info card */
    #info-card {
      width: 100%;
      max-width: 480px;
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #info-card.hidden { display: none; }

    .info-section {
      background: rgba(255,255,255,.07);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .section-label {
      font-size: .68rem;
      font-weight: 600;
      color: #4a6a8a;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 7px;
    }

    #address-text {
      font-size: 1rem;
      font-weight: 600;
      color: #f0f4f8;
      line-height: 1.5;
    }

    /* Accuracy status row */
    .accuracy-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #accuracy-status {
      font-size: .88rem;
      font-weight: 700;
    }

    #acquired-time {
      font-size: .73rem;
      color: #3a5a7a;
    }

    /* Station / bus-stop / landmark list containers */
    #stations-list,
    #busstops-list,
    #landmarks-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .station-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: rgba(255,255,255,.05);
      border-radius: 10px;
      border-left: 3px solid #4a90d9;
    }

    .bus-stop-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: rgba(255,255,255,.05);
      border-radius: 10px;
      border-left: 3px solid #f0a030;
    }

    .landmark-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: rgba(255,255,255,.05);
      border-radius: 10px;
      border-left: 3px solid #9060d0;
    }

    .station-left {
      flex: 1;
      min-width: 0;
    }

    .station-name {
      font-size: .95rem;
      font-weight: 700;
      color: #f0f4f8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .station-line {
      font-size: .75rem;
      color: #6a8aaa;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .station-right {
      text-align: right;
      margin-left: 12px;
      flex-shrink: 0;
    }

    .station-distance {
      font-size: .95rem;
      font-weight: 700;
      color: #4adba2;
    }

    .station-direction {
      font-size: .75rem;
      color: #6a8aaa;
      margin-top: 2px;
    }

    .station-status {
      font-size: .85rem;
      color: #4a6a8a;
      padding: 4px 0;
      text-align: center;
    }

    /* Footer row */
    .footer-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 2px;
    }

    #speak-btn {
      background: none;
      border: 1px solid rgba(74,144,217,.4);
      color: #4a90d9;
      font-size: .8rem;
      padding: 6px 14px;
      border-radius: 16px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Map button */
    #map-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #4a90d9, #2c6fad);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .03em;
      -webkit-user-select: none;
      user-select: none;
    }

    #map-btn:active { opacity: .85; }

    /* Tunnel warning */
    .tunnel-note {
      margin-top: 20px;
      font-size: .7rem;
      color: #2a4a6a;
      text-align: center;
      max-width: 480px;
      line-height: 1.7;
      padding: 0 4px;
    }
  </style>
</head>
<body>

  <h1>現在地読み上げ</h1>

  <button id="main-btn" onclick="getLocation()">
    <span id="btn-label">現在地を取得</span>
  </button>

  <div id="gps-error" class="hidden"></div>

  <div id="info-card" class="hidden">

    <div class="info-section">
      <div class="section-label">位置情報の状態</div>
      <div class="accuracy-row">
        <span id="accuracy-status">—</span>
        <span id="acquired-time"></span>
      </div>
    </div>

    <div class="info-section">
      <div class="section-label" id="location-label">現在地</div>
      <div id="address-text">—</div>
    </div>

    <div class="info-section">
      <div class="section-label">最寄り駅</div>
      <div id="stations-list">
        <div class="station-status">検索中...</div>
      </div>
    </div>

    <div class="info-section">
      <div class="section-label">近くのバス停</div>
      <div id="busstops-list">
        <div class="station-status">検索中...</div>
      </div>
    </div>

    <div class="info-section">
      <div class="section-label">近くの目印</div>
      <div id="landmarks-list">
        <div class="station-status">検索中...</div>
      </div>
    </div>

    <div class="footer-row">
      <button id="speak-btn" onclick="speakAddress()">もう一度読み上げ</button>
    </div>

    <button id="map-btn" onclick="openMap()">地図で開く</button>
  </div>

  <p class="tunnel-note">
    ※ 地下・トンネル内ではGPS精度が低下し、位置情報が正確でない場合があります
  </p>

  <script>
    // ---- APIキー設定 ----
    const GOOGLE_API_KEY = '__GOOGLE_API_KEY__';
    // --------------------

    let currentAddress = '';
    let currentLat = null;
    let currentLng = null;
    let currentAccuracy = null;
    let locationAcquiredAt = null;
    let currentStations = [];
    let currentBusStops = [];
    let currentLandmarks = [];
    let elapsedTimer = null;

    function unlockSpeech() {
      if (!window.speechSynthesis) return;
      const u = new SpeechSynthesisUtterance('');
      u.volume = 0;
      window.speechSynthesis.speak(u);
    }

    function getAccuracyInfo(accuracy) {
      if (accuracy === null || accuracy === undefined) {
        return { label: '位置情報：不明', color: '#e05a5a', isUnstable: true };
      }
      if (accuracy < 30) {
        return { label: '位置情報：良好', color: '#43b89c', isUnstable: false };
      }
      if (accuracy < 100) {
        return { label: '位置情報：やや不安定', color: '#f0c040', isUnstable: false };
      }
      return { label: '位置情報：不安定', color: '#f08030', isUnstable: true };
    }

    function updateElapsedTime() {
      if (!locationAcquiredAt) return;
      const elapsed = Math.floor((Date.now() - locationAcquiredAt) / 1000);
      let timeStr;
      if (elapsed < 60) {
        timeStr = 'たった今取得';
      } else if (elapsed < 3600) {
        timeStr = Math.floor(elapsed / 60) + '分前に取得';
      } else {
        timeStr = Math.floor(elapsed / 3600) + '時間前に取得';
      }
      document.getElementById('acquired-time').textContent = timeStr;
    }

    function updateAccuracyDisplay() {
      const info = getAccuracyInfo(currentAccuracy);
      const el = document.getElementById('accuracy-status');
      el.textContent = info.label;
      el.style.color = info.color;
      document.getElementById('location-label').textContent =
        info.isUnstable ? '最後に確認できた場所' : '現在地';
      updateElapsedTime();
    }

    function getLocation() {
      const btn = document.getElementById('main-btn');
      if (btn.classList.contains('loading')) return;

      unlockSpeech();

      btn.className = 'loading';
      document.getElementById('btn-label').textContent = '取得中...';
      document.getElementById('gps-error').classList.add('hidden');

      if (!navigator.geolocation) {
        showGpsError('このブラウザはGPSに対応していません');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        onGpsSuccess,
        onGpsError,
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function onGpsSuccess(pos) {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      currentAccuracy = pos.coords.accuracy;
      locationAcquiredAt = Date.now();

      const btn = document.getElementById('main-btn');
      btn.className = 'success';
      document.getElementById('btn-label').textContent = '現在地を取得';
      setTimeout(() => { btn.className = ''; }, 3000);

      document.getElementById('info-card').classList.remove('hidden');
      document.getElementById('address-text').textContent = '住所を取得中...';
      document.getElementById('stations-list').innerHTML =
        '<div class="station-status">検索中...</div>';
      document.getElementById('busstops-list').innerHTML =
        '<div class="station-status">検索中...</div>';
      document.getElementById('landmarks-list').innerHTML =
        '<div class="station-status">検索中...</div>';

      updateAccuracyDisplay();

      if (elapsedTimer) clearInterval(elapsedTimer);
      elapsedTimer = setInterval(updateElapsedTime, 30000);

      const addressPromise = reverseGeocode(currentLat, currentLng)
        .then(addr => {
          currentAddress = addr;
          document.getElementById('address-text').textContent = addr;
        })
        .catch(() => {
          document.getElementById('address-text').textContent = '住所の取得に失敗しました';
        });

      const stationsPromise = getNearbyStations(currentLat, currentLng)
        .then(stations => {
          currentStations = stations;
          renderStations(stations);
        })
        .catch(() => {
          currentStations = [];
          document.getElementById('stations-list').innerHTML =
            '<div class="station-status">最寄り駅の取得に失敗しました</div>';
        });

      const busStopsPromise = getNearbyBusStops(currentLat, currentLng)
        .then(stops => {
          currentBusStops = stops;
          renderBusStops(stops);
        })
        .catch(() => {
          currentBusStops = [];
          document.getElementById('busstops-list').innerHTML =
            '<div class="station-status">バス停の取得に失敗しました</div>';
        });

      const landmarksPromise = getNearbyLandmarks(currentLat, currentLng)
        .then(landmarks => {
          currentLandmarks = landmarks;
          renderLandmarks(landmarks);
        })
        .catch(() => {
          currentLandmarks = [];
          document.getElementById('landmarks-list').innerHTML =
            '<div class="station-status">目印の取得に失敗しました</div>';
        });

      Promise.all([addressPromise, stationsPromise, busStopsPromise, landmarksPromise])
        .then(() => speakAddress());
    }

    function onGpsError(err) {
      const msgs = {
        1: '位置情報の使用が許可されていません',
        2: '位置情報を取得できませんでした',
        3: '取得がタイムアウトしました'
      };
      showGpsError(msgs[err.code] || '位置情報の取得に失敗しました');
    }

    function showGpsError(msg) {
      const btn = document.getElementById('main-btn');
      btn.className = 'error';
      document.getElementById('btn-label').textContent = '現在地を取得';
      const errEl = document.getElementById('gps-error');
      errEl.textContent = msg;
      errEl.classList.remove('hidden');
      setTimeout(() => { btn.className = ''; }, 3000);
    }

    async function reverseGeocode(lat, lng) {
      const url = 'https://maps.googleapis.com/maps/api/geocode/json'
        + '?latlng=' + lat + ',' + lng + '&language=ja&key=' + GOOGLE_API_KEY;
      const res = await fetch(url);
      if (!res.ok) throw new Error('API error');
      const data = await res.json();
      if (data.status !== 'OK' || !data.results.length) throw new Error('No results');
      return data.results[0].formatted_address.replace(/^日本、?/, '');
    }

    function normalizeStationName(name) {
      const n = name.replace(/[\s　]/g, '');
      return n.endsWith('駅') ? n : n + '駅';
    }

    async function getNearbyStations(lat, lng) {
      const query = '[out:json][timeout:25];'
        + 'node["railway"~"station|halt"](around:1000,' + lat + ',' + lng + ')->.stations;'
        + 'rel["route"]["type"="route"](bn.stations)->.routes;'
        + '(.stations;.routes;);'
        + 'out body;';
      const res = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(query)
      });
      if (!res.ok) throw new Error('Overpass error');
      const data = await res.json();

      const nodeCount = data.elements.filter(el => el.type === 'node').length;
      const relCount = data.elements.filter(el => el.type === 'relation').length;
      console.log('[Overpass stations] nodes:', nodeCount, 'relations:', relCount);
      if (relCount > 0) {
        console.log('[Overpass stations] sample relation:', data.elements.find(el => el.type === 'relation'));
      }

      // Build nodeId -> [line names] from route relations
      const linesByNode = {};
      for (const el of data.elements) {
        if (el.type !== 'relation') continue;
        const relName = el.tags && el.tags.name;
        if (!relName) continue;
        for (const member of (el.members || [])) {
          if (member.type !== 'node') continue;
          if (!linesByNode[member.ref]) linesByNode[member.ref] = [];
          if (!linesByNode[member.ref].includes(relName)) {
            linesByNode[member.ref].push(relName);
          }
        }
      }

      // Map each node to a station object (lines as array for later merging)
      const stationNodes = data.elements
        .filter(el => el.type === 'node' && el.tags && el.tags.name)
        .map(el => {
          const dist = calcDistance(lat, lng, el.lat, el.lon);
          const bearing = calcBearing(lat, lng, el.lat, el.lon);
          const relLines = linesByNode[el.id] || [];
          // Fallback to operator tag when no route relations found
          const fallback = el.tags.operator || '';
          return {
            name: normalizeStationName(el.tags.name),
            lines: relLines.length > 0 ? relLines : (fallback ? [fallback] : []),
            distance: dist,
            direction: bearingToDirection(bearing)
          };
        });

      // Deduplicate by normalized name: keep closest, merge all line names
      const grouped = {};
      for (const s of stationNodes) {
        if (!grouped[s.name]) {
          grouped[s.name] = { ...s, lines: [...s.lines] };
        } else {
          for (const l of s.lines) {
            if (!grouped[s.name].lines.includes(l)) grouped[s.name].lines.push(l);
          }
          if (s.distance < grouped[s.name].distance) {
            grouped[s.name].distance = s.distance;
            grouped[s.name].direction = s.direction;
          }
        }
      }

      return Object.values(grouped)
        .map(s => ({ name: s.name, line: s.lines.join('・'), distance: s.distance, direction: s.direction }))
        .sort((a, b) => a.distance - b.distance)
        .slice(0, 3);
    }

    async function getNearbyBusStops(lat, lng) {
      const query = '[out:json][timeout:15];'
        + 'node["highway"="bus_stop"](around:500,' + lat + ',' + lng + ');'
        + 'out body;';
      const res = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(query)
      });
      if (!res.ok) throw new Error('Overpass error');
      const data = await res.json();

      const raw = data.elements
        .filter(el => el.tags && el.tags.name)
        .map(el => {
          const dist = calcDistance(lat, lng, el.lat, el.lon);
          const bearing = calcBearing(lat, lng, el.lat, el.lon);
          return { name: el.tags.name, lat: el.lat, lon: el.lon, distance: dist, direction: bearingToDirection(bearing) };
        })
        .sort((a, b) => a.distance - b.distance);

      return mergeBusStops(raw);
    }

    function mergeBusStops(stops) {
      const groups = {};
      for (const stop of stops) {
        const key = stop.name.replace(/[\s　]/g, '');
        if (!groups[key]) groups[key] = [];
        groups[key].push(stop);
      }

      const result = [];
      for (const group of Object.values(groups)) {
        if (group.length === 1) {
          result.push({ name: group[0].name, distance: group[0].distance, direction: group[0].direction, merged: false });
          continue;
        }
        let anyNear = false;
        outer: for (let i = 0; i < group.length; i++) {
          for (let j = i + 1; j < group.length; j++) {
            if (calcDistance(group[i].lat, group[i].lon, group[j].lat, group[j].lon) <= 200) {
              anyNear = true;
              break outer;
            }
          }
        }
        if (anyNear) {
          result.push({ name: group[0].name, distance: group[0].distance, direction: group[0].direction, merged: true });
        } else {
          for (const s of group) {
            result.push({ name: s.name, distance: s.distance, direction: s.direction, merged: false });
          }
        }
      }

      return result.sort((a, b) => a.distance - b.distance).slice(0, 3);
    }

    function getLandmarkType(tags) {
      if (!tags) return null;
      if (tags.tourism === 'information')    return { icon: 'ℹ️',  typeName: '観光案内所' };
      if (tags.amenity === 'place_of_worship') return { icon: '⛩️', typeName: '神社・寺' };
      if (tags.leisure === 'park')           return { icon: '🌳', typeName: '公園' };
      if (tags.tourism === 'museum')         return { icon: '🏛️', typeName: '博物館' };
      if (tags.amenity === 'toilets')        return { icon: '🚻', typeName: 'トイレ' };
      if (tags.amenity === 'bus_station')    return { icon: '🚌', typeName: 'バス乗り場' };
      return null;
    }

    async function getNearbyLandmarks(lat, lng) {
      const around = '(around:500,' + lat + ',' + lng + ')';
      const query = '[out:json][timeout:15];'
        + '('
        + 'node["tourism"="information"]' + around + ';'
        + 'node["amenity"="place_of_worship"]' + around + ';'
        + 'node["leisure"="park"]' + around + ';'
        + 'way["leisure"="park"]' + around + ';'
        + 'node["tourism"="museum"]' + around + ';'
        + 'node["amenity"="toilets"]' + around + ';'
        + 'node["amenity"="bus_station"]' + around + ';'
        + 'way["amenity"="bus_station"]' + around + ';'
        + ');'
        + 'out center;';
      const res = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(query)
      });
      if (!res.ok) throw new Error('Overpass error');
      const data = await res.json();

      return data.elements
        .map(el => {
          const typeInfo = getLandmarkType(el.tags);
          if (!typeInfo) return null;
          const elLat = el.type === 'node' ? el.lat : (el.center ? el.center.lat : null);
          const elLon = el.type === 'node' ? el.lon : (el.center ? el.center.lon : null);
          if (elLat == null || elLon == null) return null;
          const dist = calcDistance(lat, lng, elLat, elLon);
          const bearing = calcBearing(lat, lng, elLat, elLon);
          return {
            name: (el.tags && el.tags.name) || typeInfo.typeName,
            icon: typeInfo.icon,
            distance: dist,
            direction: bearingToDirection(bearing)
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.distance - b.distance)
        .slice(0, 3);
    }

    function renderLandmarks(landmarks) {
      const list = document.getElementById('landmarks-list');
      if (!landmarks.length) {
        list.innerHTML = '<div class="station-status">近くに目印は見つかりませんでした</div>';
        return;
      }
      list.innerHTML = landmarks.map(l =>
        '<div class="landmark-item">'
        + '<div class="station-left">'
        + '<div class="station-name">' + esc(l.icon) + ' ' + esc(l.name) + '</div>'
        + '</div>'
        + '<div class="station-right">'
        + '<div class="station-distance">' + formatDist(l.distance) + '</div>'
        + '<div class="station-direction">' + l.direction + '</div>'
        + '</div>'
        + '</div>'
      ).join('');
    }

    function renderStations(stations) {
      const list = document.getElementById('stations-list');
      if (!stations.length) {
        list.innerHTML = '<div class="station-status">付近に駅が見つかりませんでした</div>';
        return;
      }
      list.innerHTML = stations.map(s =>
        '<div class="station-item">'
        + '<div class="station-left">'
        + '<div class="station-name">' + esc(s.name) + '</div>'
        + (s.line ? '<div class="station-line">' + esc(s.line) + '</div>' : '')
        + '</div>'
        + '<div class="station-right">'
        + '<div class="station-distance">' + formatDist(s.distance) + '</div>'
        + '<div class="station-direction">' + s.direction + '</div>'
        + '</div>'
        + '</div>'
      ).join('');
    }

    function renderBusStops(stops) {
      const list = document.getElementById('busstops-list');
      if (!stops.length) {
        list.innerHTML = '<div class="station-status">近くにバス停は見つかりませんでした</div>';
        return;
      }
      list.innerHTML = stops.map(s =>
        '<div class="bus-stop-item">'
        + '<div class="station-left">'
        + '<div class="station-name">' + esc(s.name) + '</div>'
        + (s.merged ? '<div class="station-line">（複数停留所あり）</div>' : '')
        + '</div>'
        + '<div class="station-right">'
        + '<div class="station-distance">' + formatDist(s.distance) + '</div>'
        + '<div class="station-direction">' + s.direction + '</div>'
        + '</div>'
        + '</div>'
      ).join('');
    }

    function speakAddress() {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();

      const info = getAccuracyInfo(currentAccuracy);
      let text = info.isUnstable
        ? '最後に確認できた場所の周辺情報です。情報が古い可能性があります。'
        : '現在地の周辺情報です。';

      if (currentStations.length > 0) {
        const s0 = currentStations[0];
        text += '最寄り駅は' + s0.name + 'です。'
          + s0.direction + '方向に約' + Math.round(s0.distance) + 'メートルです。';
        if (currentStations.length > 1) {
          const s1 = currentStations[1];
          text += '次に近い駅は' + s1.name + 'です。'
            + s1.direction + '方向に約' + Math.round(s1.distance) + 'メートルです。';
        }
      }

      if (currentBusStops.length > 0) {
        const b0 = currentBusStops[0];
        text += '近くのバス停は' + b0.name + 'バス停です。'
          + b0.direction + '方向に約' + Math.round(b0.distance) + 'メートルです。';
      }

      if (currentLandmarks.length > 0) {
        const l0 = currentLandmarks[0];
        text += '近くの目印として、' + l0.direction + '方向に約' + Math.round(l0.distance)
          + 'メートルに' + l0.name + 'があります。';
      }

      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ja-JP';
      u.rate = 0.9;
      u.pitch = 1.0;
      window.speechSynthesis.speak(u);
    }

    function calcDistance(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const p1 = lat1 * Math.PI / 180;
      const p2 = lat2 * Math.PI / 180;
      const dp = (lat2 - lat1) * Math.PI / 180;
      const dl = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dp/2) * Math.sin(dp/2)
              + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function calcBearing(lat1, lng1, lat2, lng2) {
      const p1 = lat1 * Math.PI / 180;
      const p2 = lat2 * Math.PI / 180;
      const dl = (lng2 - lng1) * Math.PI / 180;
      const y = Math.sin(dl) * Math.cos(p2);
      const x = Math.cos(p1) * Math.sin(p2) - Math.sin(p1) * Math.cos(p2) * Math.cos(dl);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    function bearingToDirection(b) {
      var dirs = ['北', '北東', '東', '南東', '南', '南西', '西', '北西'];
      return dirs[Math.round(b / 45) % 8];
    }

    function formatDist(m) {
      return m < 1000 ? Math.round(m) + 'm' : (m / 1000).toFixed(1) + 'km';
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function openMap() {
      if (currentLat === null) return;
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      if (isIOS) {
        window.location.href = 'maps://maps.apple.com/?ll=' + currentLat + ',' + currentLng + '&q=現在地';
      } else {
        window.open('https://www.google.com/maps?q=' + currentLat + ',' + currentLng, '_blank');
      }
    }
  </script>
