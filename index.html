<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="現在地読み上げ">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="./manifest.json">
  <title>現在地読み上げ</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #1a1a2e;
      color: #fff;
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 40px;
    }

    h1 {
      font-size: 1rem;
      font-weight: 500;
      color: #a0b4cc;
      margin-bottom: 32px;
      letter-spacing: .05em;
    }

    #main-btn {
      flex-shrink: 0;
      width: min(72vw, 260px);
      height: min(72vw, 260px);
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, #4a90d9, #2c6fad);
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: .05em;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(74,144,217,.4);
      transition: transform .1s, box-shadow .1s;
      -webkit-user-select: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #main-btn:active { transform: scale(.96); }

    #main-btn.loading {
      background: linear-gradient(145deg, #6a6a8a, #4a4a6a);
      box-shadow: 0 8px 32px rgba(100,100,150,.3);
      animation: pulse 1.2s ease-in-out infinite;
    }

    #main-btn.success {
      background: linear-gradient(145deg, #43b89c, #2a8a72);
      box-shadow: 0 8px 32px rgba(67,184,156,.4);
    }

    #main-btn.error {
      background: linear-gradient(145deg, #e05a5a, #b03a3a);
      box-shadow: 0 8px 32px rgba(224,90,90,.4);
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    #gps-error {
      margin-top: 14px;
      font-size: .85rem;
      color: #e07070;
      text-align: center;
    }

    #gps-error.hidden { display: none; }

    /* Info card */
    #info-card {
      width: 100%;
      max-width: 480px;
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #info-card.hidden { display: none; }

    .info-section {
      background: rgba(255,255,255,.07);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .section-label {
      font-size: .68rem;
      font-weight: 600;
      color: #4a6a8a;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 7px;
    }

    #address-text {
      font-size: 1rem;
      font-weight: 600;
      color: #f0f4f8;
      line-height: 1.5;
    }

    /* Station list */
    #stations-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .station-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: rgba(255,255,255,.05);
      border-radius: 10px;
      border-left: 3px solid #4a90d9;
    }

    .station-left {
      flex: 1;
      min-width: 0;
    }

    .station-name {
      font-size: .95rem;
      font-weight: 700;
      color: #f0f4f8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .station-line {
      font-size: .75rem;
      color: #6a8aaa;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .station-right {
      text-align: right;
      margin-left: 12px;
      flex-shrink: 0;
    }

    .station-distance {
      font-size: .95rem;
      font-weight: 700;
      color: #4adba2;
    }

    .station-direction {
      font-size: .75rem;
      color: #6a8aaa;
      margin-top: 2px;
    }

    .station-status {
      font-size: .85rem;
      color: #4a6a8a;
      padding: 4px 0;
      text-align: center;
    }

    /* Footer row */
    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }

    #acquired-time {
      font-size: .73rem;
      color: #3a5a7a;
    }

    #speak-btn {
      background: none;
      border: 1px solid rgba(74,144,217,.4);
      color: #4a90d9;
      font-size: .8rem;
      padding: 6px 14px;
      border-radius: 16px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Map button */
    #map-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #4a90d9, #2c6fad);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .03em;
      -webkit-user-select: none;
      user-select: none;
    }

    #map-btn:active { opacity: .85; }

    /* Tunnel warning */
    .tunnel-note {
      margin-top: 20px;
      font-size: .7rem;
      color: #2a4a6a;
      text-align: center;
      max-width: 480px;
      line-height: 1.7;
      padding: 0 4px;
    }
  </style>
</head>
<body>

  <h1>現在地読み上げ</h1>

  <button id="main-btn" onclick="getLocation()">
    <span id="btn-label">現在地を取得</span>
  </button>

  <div id="gps-error" class="hidden"></div>

  <div id="info-card" class="hidden">
    <div class="info-section">
      <div class="section-label">現在地</div>
      <div id="address-text">—</div>
    </div>

    <div class="info-section">
      <div class="section-label">最寄り駅</div>
      <div id="stations-list">
        <div class="station-status">検索中...</div>
      </div>
    </div>

    <div class="footer-row">
      <span id="acquired-time"></span>
      <button id="speak-btn" onclick="speakAddress()">もう一度読み上げ</button>
    </div>

    <button id="map-btn" onclick="openMap()">地図で開く</button>
  </div>

  <p class="tunnel-note">
    ※ 地下・トンネル内ではGPS精度が低下し、位置情報が正確でない場合があります
  </p>

  <script>
    // ---- APIキー設定 ----
    const GOOGLE_API_KEY = '__GOOGLE_API_KEY__';
    // --------------------

    let currentAddress = '';
    let currentLat = null;
    let currentLng = null;

    function unlockSpeech() {
      if (!window.speechSynthesis) return;
      const u = new SpeechSynthesisUtterance('');
      u.volume = 0;
      window.speechSynthesis.speak(u);
    }

    function getLocation() {
      const btn = document.getElementById('main-btn');
      if (btn.classList.contains('loading')) return;

      unlockSpeech();

      btn.className = 'loading';
      document.getElementById('btn-label').textContent = '取得中...';
      document.getElementById('gps-error').classList.add('hidden');

      if (!navigator.geolocation) {
        showGpsError('このブラウザはGPSに対応していません');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        onGpsSuccess,
        onGpsError,
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function onGpsSuccess(pos) {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;

      const btn = document.getElementById('main-btn');
      btn.className = 'success';
      document.getElementById('btn-label').textContent = '現在地を取得';
      setTimeout(() => { btn.className = ''; }, 3000);

      document.getElementById('info-card').classList.remove('hidden');
      document.getElementById('address-text').textContent = '住所を取得中...';
      document.getElementById('stations-list').innerHTML =
        '<div class="station-status">検索中...</div>';

      const now = new Date();
      document.getElementById('acquired-time').textContent =
        '取得時刻 ' + now.toLocaleTimeString('ja-JP');

      reverseGeocode(currentLat, currentLng)
        .then(addr => {
          currentAddress = addr;
          document.getElementById('address-text').textContent = addr;
          speakAddress();
        })
        .catch(() => {
          document.getElementById('address-text').textContent = '住所の取得に失敗しました';
        });

      getNearbyStations(currentLat, currentLng)
        .then(renderStations)
        .catch(() => {
          document.getElementById('stations-list').innerHTML =
            '<div class="station-status">最寄り駅の取得に失敗しました</div>';
        });
    }

    function onGpsError(err) {
      const msgs = {
        1: '位置情報の使用が許可されていません',
        2: '位置情報を取得できませんでした',
        3: '取得がタイムアウトしました'
      };
      showGpsError(msgs[err.code] || '位置情報の取得に失敗しました');
    }

    function showGpsError(msg) {
      const btn = document.getElementById('main-btn');
      btn.className = 'error';
      document.getElementById('btn-label').textContent = '現在地を取得';
      const errEl = document.getElementById('gps-error');
      errEl.textContent = msg;
      errEl.classList.remove('hidden');
      setTimeout(() => { btn.className = ''; }, 3000);
    }

    async function reverseGeocode(lat, lng) {
      const url = 'https://maps.googleapis.com/maps/api/geocode/json'
        + '?latlng=' + lat + ',' + lng + '&language=ja&key=' + GOOGLE_API_KEY;
      const res = await fetch(url);
      if (!res.ok) throw new Error('API error');
      const data = await res.json();
      if (data.status !== 'OK' || !data.results.length) throw new Error('No results');
      return data.results[0].formatted_address.replace(/^日本、?/, '');
    }

    async function getNearbyStations(lat, lng) {
      const query = '[out:json][timeout:15];'
        + 'node["railway"~"station|halt"](around:1000,' + lat + ',' + lng + ');'
        + 'out body;';
      const res = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(query)
      });
      if (!res.ok) throw new Error('Overpass error');
      const data = await res.json();

      return data.elements
        .filter(el => el.tags && el.tags.name)
        .map(el => {
          const dist = calcDistance(lat, lng, el.lat, el.lon);
          const bearing = calcBearing(lat, lng, el.lat, el.lon);
          const line = el.tags.operator || el.tags.network || el.tags['railway:line'] || '';
          return {
            name: el.tags.name,
            line: line,
            distance: dist,
            direction: bearingToDirection(bearing)
          };
        })
        .sort((a, b) => a.distance - b.distance)
        .slice(0, 3);
    }

    function renderStations(stations) {
      const list = document.getElementById('stations-list');
      if (!stations.length) {
        list.innerHTML = '<div class="station-status">付近に駅が見つかりませんでした</div>';
        return;
      }
      list.innerHTML = stations.map(s =>
        '<div class="station-item">'
        + '<div class="station-left">'
        + '<div class="station-name">' + esc(s.name) + '</div>'
        + (s.line ? '<div class="station-line">' + esc(s.line) + '</div>' : '')
        + '</div>'
        + '<div class="station-right">'
        + '<div class="station-distance">' + formatDist(s.distance) + '</div>'
        + '<div class="station-direction">' + s.direction + '</div>'
        + '</div>'
        + '</div>'
      ).join('');
    }

    function calcDistance(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const p1 = lat1 * Math.PI / 180;
      const p2 = lat2 * Math.PI / 180;
      const dp = (lat2 - lat1) * Math.PI / 180;
      const dl = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dp/2) * Math.sin(dp/2)
              + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function calcBearing(lat1, lng1, lat2, lng2) {
      const p1 = lat1 * Math.PI / 180;
      const p2 = lat2 * Math.PI / 180;
      const dl = (lng2 - lng1) * Math.PI / 180;
      const y = Math.sin(dl) * Math.cos(p2);
      const x = Math.cos(p1) * Math.sin(p2) - Math.sin(p1) * Math.cos(p2) * Math.cos(dl);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    function bearingToDirection(b) {
      var dirs = ['北', '北東', '東', '南東', '南', '南西', '西', '北西'];
      return dirs[Math.round(b / 45) % 8];
    }

    function formatDist(m) {
      return m < 1000 ? Math.round(m) + 'm' : (m / 1000).toFixed(1) + 'km';
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function openMap() {
      if (currentLat === null) return;
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      if (isIOS) {
        window.location.href = 'maps://maps.apple.com/?ll=' + currentLat + ',' + currentLng + '&q=現在地';
      } else {
        window.open('https://www.google.com/maps?q=' + currentLat + ',' + currentLng, '_blank');
      }
    }

    function speakAddress() {
      if (!currentAddress || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(currentAddress);
      u.lang = 'ja-JP';
      u.rate = 0.9;
      u.pitch = 1.0;
      window.speechSynthesis.speak(u);
    }
  </script>

</body>
</html>
